<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<title>Knowledge Graph — De Arbetar För Dig</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #e0e0e0; overflow: hidden; }
#controls { position: fixed; top: 16px; left: 16px; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
#controls select, #controls input, #controls button {
  padding: 6px 12px; border-radius: 6px; border: 1px solid #333; background: #1a1a24; color: #e0e0e0; font-size: 13px;
}
#controls button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
#controls button:hover { background: #1d4ed8; }
#info { position: fixed; bottom: 16px; left: 16px; z-index: 10; font-size: 12px; color: #888; }
#legend { position: fixed; top: 16px; right: 16px; z-index: 10; font-size: 11px; background: #1a1a24; border: 1px solid #333; border-radius: 8px; padding: 12px; }
#legend div { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
#legend span { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
#graph { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="controls">
  <input id="search" type="text" placeholder="Sök nod..." />
  <select id="filter"><option value="">Alla typer</option></select>
  <button id="reset">Reset</button>
  <span id="count" style="font-size:12px;color:#888"></span>
</div>
<div id="legend"></div>
<div id="info">Klicka nod = fokusera kopplingar. Scroll = zoom. Drag = panorera.</div>
<div id="graph"></div>

<script type="module">
import ForceGraph from 'https://cdn.jsdelivr.net/npm/force-graph@1/+esm';
import * as d3 from 'https://cdn.jsdelivr.net/npm/d3-force@3/+esm';

// Custom cluster force — nodes of same type attract each other
function forceCluster() {
  let nodes;
  const strength = 0.15;
  const centroids = {};
  function force(alpha) {
    // Compute centroids per type
    for (const k in centroids) delete centroids[k];
    for (const n of nodes) {
      if (!centroids[n.typ]) centroids[n.typ] = { x: 0, y: 0, count: 0 };
      centroids[n.typ].x += n.x || 0;
      centroids[n.typ].y += n.y || 0;
      centroids[n.typ].count++;
    }
    for (const k in centroids) { centroids[k].x /= centroids[k].count; centroids[k].y /= centroids[k].count; }
    // Pull toward centroid
    for (const n of nodes) {
      const c = centroids[n.typ];
      if (!c) continue;
      n.vx += (c.x - n.x) * strength * alpha;
      n.vy += (c.y - n.y) * strength * alpha;
    }
  }
  force.initialize = (n) => { nodes = n; };
  return force;
}

const colors = {
  paragraf: '#f59e0b', organisation: '#10b981', politiker: '#3b82f6', lag: '#ef4444',
  möte: '#8b5cf6', dokument: '#06b6d4', leverantör: '#f97316', avtal: '#ec4899',
  tag: '#a3e635', utfall: '#14b8a6', bolag: '#fb923c', budgetpost: '#fbbf24',
  budget: '#a78bfa', närstående: '#f472b6', default: '#6b7280'
};
const sizes = {
  möte: 8, avtal: 6, dokument: 6, politiker: 4, organisation: 3, budgetpost: 2, paragraf: 2, bolag: 3, tag: 3, default: 2
};

// Load data
let allData;
try {
  const res = await fetch('/data/graf/demo.json');
  allData = await res.json();
} catch {
  allData = { nodes: [], edges: [] };
}

// Normalize edges to {source, target}
const links = allData.edges.map(e => ({ source: e.from || e.from_id, target: e.to || e.to_id, typ: e.typ }));
const nodeIds = new Set(allData.nodes.map(n => n.id));
const validLinks = links.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));

const graphData = { nodes: allData.nodes, links: validLinks };

// Populate filter
const typCounts = {};
allData.nodes.forEach(n => { typCounts[n.typ] = (typCounts[n.typ] || 0) + 1; });
const filterEl = document.getElementById('filter');
Object.entries(typCounts).sort((a,b) => b[1]-a[1]).forEach(([typ, count]) => {
  const opt = document.createElement('option');
  opt.value = typ; opt.textContent = `${typ} (${count})`;
  filterEl.appendChild(opt);
});

// Legend
const legendEl = document.getElementById('legend');
Object.entries(typCounts).sort((a,b) => b[1]-a[1]).forEach(([typ, count]) => {
  legendEl.innerHTML += `<div><span style="background:${colors[typ]||colors.default}"></span>${typ} (${count})</div>`;
});

document.getElementById('count').textContent = `${allData.nodes.length} noder, ${validLinks.length} kanter`;

// Render
let highlightNodes = new Set();
let highlightLinks = new Set();
let hoverNode = null;

const Graph = ForceGraph()(document.getElementById('graph'))
  .graphData(graphData)
  .nodeColor(n => highlightNodes.size ? (highlightNodes.has(n) ? colors[n.typ] || colors.default : '#1a1a24') : colors[n.typ] || colors.default)
  .nodeVal(n => sizes[n.typ] || sizes.default)
  .nodeLabel(n => `[${n.typ}] ${n.label}`)
  .linkColor(l => highlightLinks.has(l) ? '#888' : '#222')
  .linkWidth(l => highlightLinks.has(l) ? 1.5 : 0.3)
  .linkDirectionalParticles(l => highlightLinks.has(l) ? 2 : 0)
  .linkDirectionalParticleWidth(2)
  .backgroundColor('#0a0a0f')
  .d3Force('charge', d3.forceManyBody().strength(-15).distanceMax(150))
  .d3Force('link', d3.forceLink().distance(20).strength(0.7))
  .d3Force('center', d3.forceCenter())
  .d3Force('cluster', forceCluster())
  .onNodeClick(node => {
    highlightNodes.clear();
    highlightLinks.clear();
    if (node) {
      highlightNodes.add(node);
      validLinks.forEach(l => {
        if (l.source === node || l.target === node) {
          highlightLinks.add(l);
          highlightNodes.add(l.source);
          highlightNodes.add(l.target);
        }
      });
    }
    Graph.nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor()).linkWidth(Graph.linkWidth()).linkDirectionalParticles(Graph.linkDirectionalParticles());
  })
  .onBackgroundClick(() => {
    highlightNodes.clear();
    highlightLinks.clear();
    Graph.nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor()).linkWidth(Graph.linkWidth()).linkDirectionalParticles(Graph.linkDirectionalParticles());
  })
  .warmupTicks(80)
  .cooldownTicks(40);

// Search
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  highlightNodes.clear(); highlightLinks.clear();
  if (q) {
    allData.nodes.filter(n => n.label?.toLowerCase().includes(q)).forEach(n => highlightNodes.add(n));
  }
  Graph.nodeColor(Graph.nodeColor());
});

// Filter
filterEl.addEventListener('change', () => {
  const typ = filterEl.value;
  if (!typ) { Graph.graphData(graphData); return; }
  const filtered = allData.nodes.filter(n => n.typ === typ);
  const filteredIds = new Set(filtered.map(n => n.id));
  const filteredLinks = validLinks.filter(l => filteredIds.has(l.source?.id || l.source) && filteredIds.has(l.target?.id || l.target));
  Graph.graphData({ nodes: filtered, links: filteredLinks });
});

// Reset
document.getElementById('reset').addEventListener('click', () => {
  highlightNodes.clear(); highlightLinks.clear();
  document.getElementById('search').value = '';
  filterEl.value = '';
  Graph.graphData(graphData).nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor());
});
</script>
</body>
</html>
