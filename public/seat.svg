<svg style="background:#fff" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-label="Göteborgs kommunfullmäktige — 81 ledamöter">
  <defs>
    <pattern id="smallGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="lightgray" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="gray" stroke-width="1"/>
    </pattern>
      <style>
      @import url("../packages/ui/src/tokens/css/global.css");
      @import url("../packages/ui/src/tokens/css/svg.css");
    </style>

    <clipPath id="seat">
      <rect x="0" y="0" width="60" height="40" rx="8"/>
    </clipPath>

    <symbol id="mic">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--system-white)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mic-vocal-icon lucide-mic-vocal"><path d="m11 7.601-5.994 8.19a1 1 0 0 0 .1 1.298l.817.818a1 1 0 0 0 1.314.087L15.09 12"/><path d="M16.5 21.174C15.5 20.5 14.372 20 13 20c-2.058 0-3.928 2.356-6 2-2.072-.356-2.775-3.369-1.5-4.5"/><circle cx="16" cy="7" r="5"/></svg>
    </symbol>

    <symbol id="motion">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--system-white)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-text-icon lucide-file-text"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
    </symbol>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- S -->
  <svg x="0" y="0">
    <svg x="0" y="0">
      <g clip-path="url(#seat)">
        <rect x="0" y="0" width="100%" height="100%" class="vote ja"/>
        <use href="#motion" x="0" y="1"/>
        <rect x="23" y="3" width="50" height="34" class="shadow" rx="17" transform="rotate(43, 40, 20)"/>
        <circle cx="40" cy="20" r="17" class="seat parti-c" />
        <text x="40" y="22" class="h2 inverse">C</text>
      </g>
    </svg>

    <svg x="70" y="0">
      <g clip-path="url(#seat)">
        <rect x="0" y="0" width="100%" height="100%" class="vote nej"/>
        <use href="#mic" x="0" y="1"/>
        <rect x="23" y="3" width="50" height="34" class="shadow" rx="17" transform="rotate(45, 40, 20)"/>
        <circle cx="40" cy="20" r="17" class="seat parti-s" />
        <text x="40" y="22" class="h2 inverse">S</text>
      </g>
    </svg>

    <svg x="0" y="70">
      <g clip-path="url(#seat)">
        <rect x="0" y="0" width="100%" height="100%" class="vote avstår"/>
        <use href="#mic" x="0" y="1"/>
        <rect x="23" y="3" width="50" height="34" class="shadow" rx="17" transform="rotate(43, 40, 20)"/>
        <circle cx="40" cy="20" r="17" class="seat parti-sd" />
        <text x="40" y="22" class="h2 inverse">SD</text>
      </g>
    </svg>

    <svg x="70" y="70">
      <g clip-path="url(#seat)">
        <rect x="0" y="0" width="100%" height="100%" class="vote frånvarande"/>
        <rect x="23" y="3" width="50" height="34" class="shadow" rx="17" transform="rotate(43, 40, 20)"/>
        <circle cx="40" cy="20" r="17" class="seat parti-l" />
        <text x="40" y="22" class="h2 inverse">L</text>
      </g>
    </svg>
  </svg>

  <svg x="0" y="140">
      <g clip-path="url(#seat)">
        <rect x="0" y="0" width="100%" height="100%" class="vote"/>
        <rect x="23" y="3" width="50" height="34" class="shadow" rx="17" transform="rotate(43, 40, 20)"/>
        <circle cx="40" cy="20" r="17" class="seat parti-mp" />
        <text x="40" y="22" class="h2 inverse">MP</text>
      </g>
    </svg>
  </svg>

</svg>