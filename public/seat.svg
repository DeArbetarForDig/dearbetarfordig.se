<svg style="background:#fff" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-label="Göteborgs kommunfullmäktige — 81 ledamöter">
  <defs>
    <pattern id="smallGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="lightgray" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="gray" stroke-width="1"/>
    </pattern>
      <style>
      @import url("../packages/ui/src/tokens/css/global.css");
      @import url("../packages/ui/src/tokens/css/svg.css");
    </style>

    <clipPath id="seat">
      <rect x="0" y="0" width="50" height="50" rx="6"/>
    </clipPath>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- S -->
  <svg x="0" y="0">
    <svg x="0" y="0">
      <g clip-path="url(#seat)">
        <rect x="0" y="0" width="100%" height="100%" class="black"/>
        <rect x="0" y="0" width="100%" height="100%" class="vote ja"/>
        <rect x="10" y="10" width="50" height="30" class="shadow" rx="15" transform="rotate(45, 25, 25)"/>
        <circle cx="25" cy="25" r="15" class="seat parti-s" />
        <text x="25" y="26.5" class="h3 inverse">S</text>
      </g>
    </svg>

    <svg x="60" y="0">
