services:
  api:
    build: .
    image: ghcr.io/dearbetarfordig/dearbetarfordig.se:latest
    # No host port — only Caddy is internet-facing. Other services on the
    # default compose network reach it at http://api:3000.
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://daf:${POSTGRES_PASSWORD}@db:5432/daf
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daf
      POSTGRES_USER: daf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No host port — Postgres must not be reachable from the internet.
    # Use `docker compose exec db psql -U daf` for a shell when needed.
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U daf']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Only public-facing service: terminates TLS (automatic Let's Encrypt via
  # Caddyfile) and reverse-proxies to api. See docs/DEPLOY-CHECKLIST.md.
  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
