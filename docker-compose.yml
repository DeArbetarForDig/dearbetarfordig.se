services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://daf:daf_local@db:5432/daf
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daf
      POSTGRES_USER: daf
      POSTGRES_PASSWORD: daf_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  whisper:
    build:
      context: .
      dockerfile: docker/whisper.Dockerfile
    volumes:
      - ./.tmp:/data
    profiles:
      - transcribe

volumes:
  pgdata:
