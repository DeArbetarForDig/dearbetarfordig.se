services:
  api:
    build: .
    # IMAGE_TAG lets deploy.yml (manual workflow_dispatch) pick a specific
    # sha-tagged build to roll back to; defaults to latest for local/dev use.
    image: ghcr.io/dearbetarfordig/dearbetarfordig.se:${IMAGE_TAG:-latest}
    # No host port — only Caddy is internet-facing. Other services on the
    # default compose network reach it at http://api:3000.
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://daf:${POSTGRES_PASSWORD}@db:5432/daf
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    # Pre-seeded image baked in CI (ci.yml build-and-push, Dockerfile.db):
    # the dump of data/*.json loads via initdb when the container is
    # (re)created. No volume on purpose — the DB is a pure derived artifact,
    # PGDATA lives in the container layer, every deploy starts clean.
    image: ghcr.io/dearbetarfordig/dearbetarfordig.se-db:${IMAGE_TAG:-latest}
    environment:
      POSTGRES_DB: daf
      POSTGRES_USER: daf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No host port — Postgres must not be reachable from the internet.
    # Use `docker compose exec db psql -U daf` for a shell when needed.
    expose:
      - "5432"
    healthcheck:
      # -h 127.0.0.1 forces TCP: while the entrypoint loads the baked dump
      # it runs a temporary socket-only server, and a socket pg_isready
      # would report healthy before the data exists.
      test: ['CMD-SHELL', 'pg_isready -U daf -h 127.0.0.1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Only public-facing service: terminates TLS (automatic Let's Encrypt via
  # Caddyfile) and reverse-proxies to api. See docs/HOSTING.md deploy checklist.
  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
