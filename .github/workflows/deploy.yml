name: Deploy

# Manual only — never triggered by push/PR. Building and publishing the
# images (ci.yml's build-and-push job) is automatic; putting new images
# live on the server is a deliberate, separate action taken from the
# Actions tab ("Run workflow"), so a merge to main never pushes straight
# to production.
#
# The server holds no repo clone: everything it needs is the two GHCR
# images (API + pre-seeded DB), docker-compose.yml, Caddyfile and its
# local .env (POSTGRES_PASSWORD). This workflow ships the two config
# files and restarts the stack; the DB container re-initializes from the
# baked dump, so data updates need no seed step.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy — "latest" or "sha-xxxxxxx" (from a build-and-push run) to roll back to a specific commit'
        required: false
        default: latest
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Optional: configure this environment in repo Settings → Environments
    # with required reviewers to add an approval gate on top of the manual
    # trigger. Works fine with zero setup too — it's just a label until then.
    environment: production
    steps:
      - uses: actions/checkout@v5
      - name: Ship compose config
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: 'docker-compose.yml,Caddyfile'
          target: /opt/daf
      - name: Deploy ${{ inputs.image_tag }} to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd /opt/daf
            IMAGE_TAG="${IMAGE_TAG:-latest}" docker compose pull
            IMAGE_TAG="${IMAGE_TAG:-latest}" docker compose up -d --remove-orphans
            # Old images pile up fast when every deploy ships a ~fresh DB
            # image; anonymous volumes are the empty stubs postgres's
            # declared VOLUME leaves behind (PGDATA lives elsewhere).
            docker image prune -f
            docker volume prune -f
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
