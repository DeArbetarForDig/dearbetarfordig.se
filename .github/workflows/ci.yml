name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm -r typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: daf
          POSTGRES_USER: daf
          POSTGRES_PASSWORD: daf_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://daf:daf_local@localhost:5432/daf
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @daf/pipeline test
      - run: pnpm --filter @daf/api db:seed
      - name: Start API server
        run: |
          pnpm --filter @daf/api exec tsx src/index.ts &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/healthz && break
            sleep 1
          done
      - run: pnpm --filter @daf/api test

  # Builds and publishes the image on every push to main — this is CI, it
  # only produces an artifact. It never touches the server; see deploy.yml
  # (manual workflow_dispatch) for that step.
  build-and-push:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/dearbetarfordig/dearbetarfordig.se:latest
            ghcr.io/dearbetarfordig/dearbetarfordig.se:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
