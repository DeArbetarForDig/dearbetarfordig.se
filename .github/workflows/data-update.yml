name: Weekly Data Update

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday 06:00 UTC
  workflow_dispatch: # Manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system deps
        run: sudo apt-get install -y poppler-utils

      - name: Install Playwright browsers
        run: pnpm --filter @daf/pipeline exec playwright install chromium --with-deps

      - name: Scrape politiker
        run: pnpm scrape:alla-fortroendevalda

      # Historical enrichment only (2017/2020 archive snapshots) — unrelated
      # to this week's documents. archive.org's CDX API 503s often enough
      # that it must not block the actually time-sensitive steps below
      # (confirmed by a real run: 2026-07-20, CDX HTTP 503, whole job aborted
      # before Scrape handlingar ever ran).
      - name: Enrich mandatperioder (Wayback Machine)
        continue-on-error: true
        run: npx tsx packages/pipeline/src/scrapers/enrich-mandatperioder.ts

      - name: Scrape handlingar
        run: pnpm scrape:handlingar

      # scrape:handlingar only writes an index of document URLs — nothing
      # downloaded the actual PDFs, so "Parse new protokoll" below always
      # globbed an empty directory (confirmed: both past successful runs
      # only ever touched the roster + handlingar timestamp, never
      # data/graf/kf-*.json). This step is the missing link.
      - name: Download protokoll PDFs
        run: pnpm download:protokoll

      - name: Parse new protokoll
        run: |
          for pdf in data/beslut/protokoll/*.pdf; do
            [ -f "$pdf" ] || continue
            datum=$(basename "$pdf" .pdf | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
            [ -z "$datum" ] && continue
            # Skip if already parsed
            [ -f "data/graf/kf-${datum}.json" ] && continue
            echo "Parsing: $pdf ($datum)"
            npx tsx packages/pipeline/src/parsers/parse-protokoll.ts "$pdf" "$datum"
          done

      # Regenerates ALL röstade_* edges from the voting bilagor (downloads
      # protocol PDFs it doesn't have; refuses to write if the parse yields
      # <90% of the existing edge count, so a bad run can't wipe the votes).
      - name: Regenerate röstade edges (voteringar)
        run: npx tsx packages/pipeline/src/parsers/parse-voteringar.ts

      - name: Check for changes
        id: changes
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "$(git diff --staged --stat)"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "data: weekly update $(date +%Y-%m-%d)"
          git push
