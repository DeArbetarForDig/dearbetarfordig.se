name: Weekly Data Update

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday 06:00 UTC
  workflow_dispatch: # Manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system deps
        run: sudo apt-get install -y poppler-utils

      - name: Install Playwright browsers
        run: pnpm --filter @daf/pipeline exec playwright install chromium --with-deps

      - name: Scrape politiker
        run: pnpm scrape:politiker

      - name: Scrape handlingar
        run: pnpm scrape:handlingar

      - name: Parse new protokoll
        run: |
          for pdf in data/beslut/protokoll/*.pdf; do
            [ -f "$pdf" ] || continue
            datum=$(basename "$pdf" .pdf | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
            [ -z "$datum" ] && continue
            # Skip if already parsed
            [ -f "data/graf/kf-${datum}.json" ] && continue
            echo "Parsing: $pdf ($datum)"
            npx tsx packages/pipeline/src/parsers/parse-protokoll.ts "$pdf" "$datum"
          done

      - name: Check for changes
        id: changes
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "$(git diff --staged --stat)"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "data: weekly update $(date +%Y-%m-%d)"
          git push
